name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:  # allows manual trigger from any branch via GitHub UI

# Only one deploy at a time — a second push to main queues behind the first
# so two runs never race on the single `colman` runner mid-deploy.
concurrency:
  group: ci-cd-main
  cancel-in-progress: false

permissions:
  contents: read
  packages: write   # allows GITHUB_TOKEN to push to ghcr.io

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  # ── Builds (parallel, after all tests pass) ──────────────────────────────────
  build-client:
    name: Build & Push Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: apps/client
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/jamon-client:latest
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client

  build-orchestrator:
    name: Build & Push Orchestrator
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: apps/orchestrator
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/jamon-orchestrator:latest
          cache-from: type=gha,scope=orchestrator
          cache-to: type=gha,mode=max,scope=orchestrator

  build-data-engine:
    name: Build & Push Data Engine
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: apps/data-engine
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/jamon-data-engine:latest
          cache-from: type=gha,scope=data-engine
          cache-to: type=gha,mode=max,scope=data-engine

  # ── Deploy (after all builds succeed) ────────────────────────────────────────
  deploy:
    name: Deploy to College Server
    runs-on: [self-hosted, colman]
    needs: [build-client, build-orchestrator, build-data-engine]

    env:
      # ── Orchestrator env ──────────────────────────────────────────────────
      SPOTIFY_CLIENT_ID: ${{ vars.SPOTIFY_CLIENT_ID }}
      SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
      SPOTIFY_REDIRECT_URI: ${{ vars.SPOTIFY_REDIRECT_URI }}
      SPOTIFY_CLIENTS: ${{ secrets.SPOTIFY_CLIENTS }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      DB_PORT: ${{ vars.DB_PORT }}
      DB_USERNAME: ${{ vars.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ vars.DB_NAME }}
      API_URL: ${{ vars.API_URL }}
      CLIENT_URL: ${{ vars.CLIENT_URL }}
      DATA_ENGINE_URL: ${{ vars.DATA_ENGINE_URL }}
      # ── Data engine env ───────────────────────────────────────────────────
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      GENIUS_ACCESS_TOKEN: ${{ secrets.GENIUS_ACCESS_TOKEN }}
      EMBEDDING_PROVIDER: ${{ vars.EMBEDDING_PROVIDER }}
      TAGGING_PROVIDER: ${{ vars.TAGGING_PROVIDER }}
      DJ_PROVIDER: ${{ vars.DJ_PROVIDER }}
      HYDE_PROVIDER: ${{ vars.HYDE_PROVIDER }}
      VECTOR_DB_PROVIDER: ${{ vars.VECTOR_DB_PROVIDER }}
      PROVIDER_FAILOVER_ENABLED: ${{ vars.PROVIDER_FAILOVER_ENABLED }}
      PROVIDER_FAILOVER_CHAIN: ${{ vars.PROVIDER_FAILOVER_CHAIN }}
      PROVIDER_CIRCUIT_FAILURE_THRESHOLD: ${{ vars.PROVIDER_CIRCUIT_FAILURE_THRESHOLD }}
      PROVIDER_CIRCUIT_WINDOW_SECONDS: ${{ vars.PROVIDER_CIRCUIT_WINDOW_SECONDS }}
      PROVIDER_CIRCUIT_COOLDOWN_SECONDS: ${{ vars.PROVIDER_CIRCUIT_COOLDOWN_SECONDS }}
      PROVIDER_FAILOVER_PROVIDER_ATTEMPTS: ${{ vars.PROVIDER_FAILOVER_PROVIDER_ATTEMPTS }}
      COLLEGE_BASE_URL: ${{ vars.COLLEGE_BASE_URL }}
      COLLEGE_USERNAME: ${{ vars.COLLEGE_USERNAME }}
      COLLEGE_PASSWORD: ${{ secrets.COLLEGE_PASSWORD }}
      NIM_BASE_URL: ${{ vars.NIM_BASE_URL }}
      NIM_TAGGING_MODEL: ${{ vars.NIM_TAGGING_MODEL }}
      NIM_HYDE_MODEL: ${{ vars.NIM_HYDE_MODEL }}
      LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
      GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
      ORCHESTRATOR_URL: ${{ vars.ORCHESTRATOR_URL }}
      LOG_LEVEL: ${{ vars.LOG_LEVEL }}

    steps:
      - name: Checkout (for docker-compose.yml)
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest images
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/jamon-client:latest
          docker pull ghcr.io/${{ github.repository_owner }}/jamon-orchestrator:latest
          docker pull ghcr.io/${{ github.repository_owner }}/jamon-data-engine:latest

      - name: Deploy containers
        run: docker compose up -d --remove-orphans

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for containers to report healthy..."
          for service in jamon-client jamon-orchestrator jamon-data-engine; do
            for i in $(seq 1 24); do
              status=$(docker inspect --format='{{.State.Health.Status}}' "$service" 2>/dev/null || echo "missing")
              echo "  $service → $status (attempt $i/24)"
              if [ "$status" = "healthy" ]; then break; fi
              if [ "$i" -eq 24 ]; then
                echo "ERROR: $service did not become healthy within 120s"
                docker logs "$service" --tail 50
                exit 1
              fi
              sleep 5
            done
          done
          echo "All services healthy."

      - name: Remove dangling and old images
        run: |
          docker image prune -f
          docker images --format '{{.Repository}}:{{.Tag}} {{.ID}}' \
            | grep -E 'jamon-(client|orchestrator|data-engine)' \
            | grep -v ':latest' \
            | awk '{print $2}' \
            | xargs -r docker rmi -f || true
