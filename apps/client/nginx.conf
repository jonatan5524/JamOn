# HTTP: only health probe passes; everything else redirects to HTTPS
server {
    listen 80;

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: SSL termination + reverse proxy + SPA static serving
server {
    listen 443 ssl;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    root  /usr/share/nginx/html;
    index index.html;

    # Proxy orchestrator routes
    location ~ ^/(api|docs|playlists|internal)(/|$) {
        proxy_pass         http://orchestrator:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # React SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
